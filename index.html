<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="TouchAI — hardware-aware AI. Situational intelligence that gives every model deep knowledge of the hardware it runs on." />
  <meta property="og:title" content="TouchAI — Hardware-Aware AI" />
  <meta property="og:description" content="Not how smart is the AI — how well does it understand where it is. SDK + Situated Agent." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='none' stroke='%230B8F8C' stroke-width='2'/><circle cx='16' cy='16' r='4' fill='%230B8F8C'/></svg>" />
  <title>TouchAI — Hardware-Aware AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="boot" class="boot" aria-hidden="false">
    <div class="boot-inner">
      <div class="boot-logo"><span class="boot-ring"></span><span class="boot-dot"></span></div>
      <div class="boot-title">TouchAI</div>
      <div class="boot-sub">Hardware-aware AI · Situational intelligence</div>
      <div id="bootLog" class="boot-log" role="log" aria-live="polite"></div>
      <div class="boot-bar"><div id="bootProgress" class="boot-bar-fill"></div></div>
    </div>
  </div>

  <div id="cursor" class="cursor" aria-hidden="true">
    <div class="cursor-ring"></div>
    <div class="cursor-dot"></div>
  </div>
  <div id="rippleLayer" class="ripple-layer" aria-hidden="true"></div>

  <div id="app" class="app hidden">
    <header class="site-header">
      <button class="header-left interactive" data-nav="vision" type="button" aria-label="TouchAI home">
        <div class="logo-mark"><span class="logo-ring"></span><span class="logo-dot"></span></div>
        <div>
          <span class="logo-text">TouchAI</span>
          <span class="logo-tagline">Hardware-aware AI</span>
        </div>
      </button>

      <nav class="site-nav" aria-label="Main">
        <button class="nav-link interactive active" data-view="vision">Vision</button>
        <button class="nav-link interactive" data-view="sdk">SDK</button>
        <button class="nav-link interactive" data-view="device">Device</button>
        <button class="nav-link interactive" data-view="live">Live</button>
      </nav>

      <div class="header-right">
        <span class="header-stat" id="navSituation">Situational intelligence</span>
        <span class="runtime-badge" id="runtimeBadge">—</span>
      </div>
    </header>

    <div class="focus-bar" id="focusBar">
      <span class="focus-view">Vision · situational intelligence</span>
      <span class="focus-sep">·</span>
      <span class="focus-device">Hardware-aware AI on your device</span>
    </div>

    <div class="journey-strip" id="journeyStrip"></div>

    <div class="view-container">
      <div id="viewVision" class="view"></div>
      <div id="viewSdk" class="view hidden"></div>
      <div id="viewDevice" class="view hidden"></div>
      <div id="viewLive" class="view hidden">
        <header class="demo-topbar">
          <div class="demo-topbar-left">
            <h1 id="demoTitle">Situated Agent</h1>
            <span class="topbar-badge" id="modelBadge">Pulse</span>
          </div>
          <div class="stats-bar">
            <div class="stat"><span class="stat-label">Last</span><span class="stat-val" id="statLast">—</span></div>
            <div class="stat"><span class="stat-label">Avg</span><span class="stat-val" id="statAvg">—</span></div>
            <div class="stat"><span class="stat-label">Queries</span><span class="stat-val" id="statQueries">0</span></div>
            <div class="stat"><span class="stat-label">Tokens</span><span class="stat-val" id="statTokens">0</span></div>
          </div>
        </header>
        <div id="demoRoot" class="demo-root"></div>
      </div>
    </div>

    <footer class="site-footer">
      <div class="status-dot online"></div>
      <span id="statusText">Situational intelligence · scanning</span>
      <span class="footer-sep">·</span>
      <span>SDK · Device · hardware-aware deployment</span>
    </footer>
  </div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
