<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TouchAI</title>
    <style>
      :root {
        color-scheme: dark light;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        line-height: 1.5;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }
      main {
        max-width: 40rem;
      }
      h1 {
        font-size: clamp(1.75rem, 4vw, 2.25rem);
        margin: 0 0 0.75rem;
      }
      p {
        margin: 0.5rem 0;
        opacity: 0.85;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 0.95em;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>TouchAI</h1>
      <p>
        Universal touch interaction language, runtime, and adapters. This site is a lightweight
        deployment root for the monorepo; libraries live under <code>packages/</code>.
      </p>
      <p>
        Source: <a href="https://github.com/EricSense/TouchAI">github.com/EricSense/TouchAI</a>
      </p>
    </main>
  </body>
</html>
